server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    # eureka server
    # khong dang ky chinh no voi eureka server
    register-with-eureka: false
    fetch-registry: false

  server:
    enable-self-preservation: false
    # eviction-interval-timer-in-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
